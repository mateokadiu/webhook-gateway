name: webhook-gateway

services:
  postgres:
    image: postgres:16-alpine
    container_name: gateway-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gateway}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gateway}
      POSTGRES_DB: ${POSTGRES_DB:-gateway}
    ports: ["${POSTGRES_PORT:-5434}:5432"]
    volumes:
      - gateway-pgdata:/var/lib/postgresql/data
      - ./ops/docker/postgres-init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    restart: unless-stopped
    ports: ["${REDIS_PORT:-6381}:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    container_name: gateway-api
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      NODE_ENV: production
      API_PORT: 5001
      API_HOST: 0.0.0.0
      DATABASE_URL: postgres://${POSTGRES_USER:-gateway}:${POSTGRES_PASSWORD:-gateway}@postgres:5432/${POSTGRES_DB:-gateway}
      REDIS_URL: redis://redis:6379
      ADMIN_BEARER: ${ADMIN_BEARER}
      WEBHOOK_GATEWAY_PLUGINS: ${WEBHOOK_GATEWAY_PLUGINS:-@webhook-gateway/plugin-hmac}
      INGRESS_MAX_BODY_BYTES: ${INGRESS_MAX_BODY_BYTES:-1048576}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports: ["${API_PORT:-5001}:5001"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5001/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  admin:
    container_name: gateway-admin
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:5001}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 5000
    ports: ["${ADMIN_PORT:-5000}:5000"]

volumes:
  gateway-pgdata:
